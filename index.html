<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMSE Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root { --bg: #0e0c0a; --surface: #1a1714; --surface2: #242019; --border: #2e2a24; --gold: #c9a84c; --gold-dim: #3d3010; --text: #e8e0d4; --text-muted: #7a7060; --red: #c0442a; --green: #4a9c5d; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; }
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); }
  .btn { padding: 0.6rem 1.2rem; border-radius: 4px; border: none; cursor: pointer; font-weight: 500; }
  .btn-gold { background: var(--gold); color: var(--bg); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; }
  .card { background: var(--surface); border: 1px solid var(--border); padding: 1.25rem; border-radius: 8px; }
  .card-img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 1rem; }
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 450px; padding: 2rem; border-radius: 12px; position: relative; }
  .form-group { margin-bottom: 1rem; }
  input, textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 0.8rem; color: var(--text); border-radius: 4px; }
  #chat-history { height: 300px; overflow-y: auto; background: var(--surface2); padding: 10px; border-radius: 4px; display: flex; flex-direction: column; gap: 8px; }
</style>
</head>
<body>

<nav>
  <div class="logo">NUMSE</div>
  <div id="nav-content">
    <button class="btn btn-outline" onclick="openAuth('login')">Login</button>
  </div>
</nav>

<div class="container">
  <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
    <h1>Marketplace</h1>
    <button class="btn btn-gold" onclick="openSell()">+ Sell Item</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="chat-overlay">
  <div class="modal">
    <button onclick="this.parentElement.parentElement.classList.remove('show')" style="float:right; background:none; border:none; color:white;">✕</button>
    <h2 id="chat-title">Chat</h2>
    <div id="chat-history"></div>
    <div style="display:flex; gap:5px; margin-top:10px;">
      <input id="chat-input" placeholder="Message...">
      <button class="btn btn-gold" onclick="sendMessage()">Send</button>
    </div>
  </div>
</div>

<div class="overlay" id="sell-overlay">
  <div class="modal">
    <h2>List Item</h2>
    <input type="file" id="sell-img" accept="image/*" style="margin-bottom:10px;">
    <input id="sell-title" placeholder="Title" class="form-group">
    <input id="sell-price" type="number" placeholder="Price" class="form-group">
    <textarea id="sell-desc" placeholder="Description" class="form-group"></textarea>
    <button class="btn btn-gold" onclick="doSell()">Post</button>
    <button class="btn btn-outline" onclick="document.getElementById('sell-overlay').classList.remove('show')">Cancel</button>
  </div>
</div>

<div class="overlay" id="auth-overlay">
  <div class="modal">
    <h2 id="auth-title">Login</h2>
    <input id="auth-user" placeholder="Username" class="form-group">
    <input id="auth-pass" type="password" placeholder="Password" class="form-group">
    <button class="btn btn-gold" onclick="doAuth()">Submit</button>
    <button class="btn btn-outline" onclick="openAuth('register')">Need Account?</button>
  </div>
</div>

<script>
let currentUser = localStorage.getItem('username');
let chatPartner = null;

async function api(method, path, body) {
  const token = localStorage.getItem('token');
  const res = await fetch(path, {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
    body: body ? JSON.stringify(body) : null
  });
  return res.json();
}

function openAuth(m) { mode = m; document.getElementById('auth-overlay').classList.add('show'); }
async function doAuth() {
  const username = document.getElementById('auth-user').value;
  const password = document.getElementById('auth-pass').value;
  const res = await api('POST', mode === 'login' ? '/api/login' : '/api/register', { username, password });
  if (res.token) { localStorage.setItem('token', res.token); localStorage.setItem('username', res.username); location.reload(); }
}

async function loadListings() {
  const items = await api('GET', '/api/listings');
  document.getElementById('grid').innerHTML = items.map(l => `
    <div class="card">
      ${l.image ? `<img src="${l.image}" class="card-img">` : ''}
      <h3>${l.title}</h3>
      <p style="color:var(--gold)">🪙 ${l.price}</p>
      <button class="btn btn-outline" style="width:100%; margin-top:10px;" onclick="openChat('${l.seller}')">💬 Chat</button>
      ${currentUser === 'admin' || currentUser === l.seller ? `<button class="btn" style="color:red" onclick="deleteItem('${l.id}')">Delete</button>` : ''}
    </div>
  `).join('');
}

function openChat(seller) {
  if (!currentUser) return alert("Login first");
  chatPartner = seller;
  document.getElementById('chat-title').innerText = "Chat with " + seller;
  document.getElementById('chat-overlay').classList.add('show');
  pollChat();
}

async function pollChat() {
  if (!document.getElementById('chat-overlay').classList.contains('show')) return;
  const msgs = await api('GET', '/api/messages');
  const filtered = msgs.filter(m => (m.from === currentUser && m.to === chatPartner) || (m.from === chatPartner && m.to === currentUser));
  document.getElementById('chat-history').innerHTML = filtered.map(m => `
    <div style="text-align:${m.from === currentUser ? 'right' : 'left'}">
      <small>${m.from}</small><br>
      <span style="background:var(--surface); padding:5px; border-radius:5px; border:1px solid var(--border)">${m.text}</span>
    </div>
  `).join('');
  setTimeout(pollChat, 3000);
}

async function sendMessage() {
  const text = document.getElementById('chat-input').value;
  await api('POST', '/api/messages', { to: chatPartner, text });
  document.getElementById('chat-input').value = '';
  pollChat();
}

async function doSell() {
  const file = document.getElementById('sell-img').files[0];
  let img = file ? await new Promise(r => { const reader = new FileReader(); reader.onloadend = () => r(reader.result); reader.readAsDataURL(file); }) : null;
  await api('POST', '/api/listings', { title: document.getElementById('sell-title').value, price: document.getElementById('sell-price').value, desc: document.getElementById('sell-desc').value, image: img });
  location.reload();
}

if (currentUser) {
    document.getElementById('nav-content').innerHTML = `<span>🪙 ${currentUser}</span> <button class="btn btn-outline" onclick="localStorage.clear(); location.reload();">Logout</button>`;
}

loadListings();
</script>
</body>
</html>
