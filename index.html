<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUMSE Marketplace</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,900;1,700&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0c0a;
    --surface: #1a1714;
    --surface2: #242019;
    --border: #2e2a24;
    --gold: #c9a84c;
    --gold-light: #e8c96a;
    --gold-dim: #3d3010;
    --text: #e8e0d4;
    --text-muted: #7a7060;
    --red: #c0442a;
    --green: #4a9c5d;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; min-height: 100vh; }
  
  /* Navigation */
  nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 1rem 2rem; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--gold); letter-spacing: -1px; }
  .nav-right { display: flex; gap: 1.5rem; align-items: center; }
  .nav-user { display: flex; align-items: center; gap: 0.75rem; font-family: 'DM Mono', monospace; font-size: 0.9rem; }
  .coin-badge { background: var(--gold-dim); color: var(--gold-light); padding: 0.2rem 0.6rem; border-radius: 4px; border: 1px solid var(--gold); }

  /* Buttons */
  .btn { padding: 0.6rem 1.2rem; border-radius: 4px; border: none; cursor: pointer; font-weight: 500; font-family: inherit; transition: all 0.2s; }
  .btn-gold { background: var(--gold); color: var(--bg); }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-outline { background: transparent; color: var(--text); border: 1px solid var(--border); }
  .btn-outline:hover { border-color: var(--gold); color: var(--gold); }
  .btn-danger { background: var(--red); color: white; }
  .btn-green { background: var(--green); color: white; }

  /* Main Grid */
  .container { max-width: 1200px; margin: 2rem auto; padding: 0 1.5rem; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 1.5rem; margin-top: 2rem; }
  
  /* Cards */
  .card { background: var(--surface); border: 1px solid var(--border); padding: 1.25rem; border-radius: 8px; display: flex; flex-direction: column; transition: transform 0.2s; }
  .card:hover { border-color: var(--gold); transform: translateY(-3px); }
  .card-img { width: 100%; height: 180px; object-fit: cover; border-radius: 6px; margin-bottom: 1rem; background: var(--surface2); }
  .card-title { font-family: 'Playfair Display', serif; font-size: 1.25rem; margin-bottom: 0.5rem; }
  .card-desc { font-size: 0.9rem; color: var(--text-muted); margin-bottom: 1rem; flex-grow: 1; }
  .card-footer { display: flex; justify-content: space-between; align-items: center; border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 0.5rem; }
  .card-price { color: var(--gold); font-weight: bold; font-family: 'DM Mono', monospace; }

  /* Modals */
  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 1rem; }
  .overlay.show { display: flex; }
  .modal { background: var(--surface); border: 1px solid var(--border); width: 100%; max-width: 450px; padding: 2rem; border-radius: 12px; position: relative; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: none; border: none; color: var(--text-muted); cursor: pointer; font-size: 1.2rem; }
  .form-group { margin-bottom: 1.2rem; }
  label { display: block; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; color: var(--text-muted); margin-bottom: 0.5rem; }
  input, textarea, select { width: 100%; background: var(--surface2); border: 1px solid var(--border); padding: 0.8rem; color: var(--text); border-radius: 4px; outline: none; }
  input:focus { border-color: var(--gold); }
  .error-msg { color: var(--red); font-size: 0.85rem; margin-top: 0.5rem; height: 1.2rem; }
</style>
</head>
<body>

<nav>
  <div class="logo">NUMSE</div>
  <div class="nav-right" id="nav-content">
    <button class="btn btn-outline" onclick="openAuth('login')">Login</button>
    <button class="btn btn-gold" onclick="openAuth('register')">Register</button>
  </div>
</nav>

<div class="container">
  <div style="display: flex; justify-content: space-between; align-items: center;">
    <h1 style="font-family: 'Playfair Display', serif;">Browse Listings</h1>
    <button class="btn btn-gold" onclick="openSell()">+ Sell Something</button>
  </div>
  <div class="grid" id="grid"></div>
</div>

<div class="overlay" id="auth-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeAuth()">✕</button>
    <h2 id="auth-title" style="margin-bottom: 1.5rem;">Login</h2>
    <div class="form-group">
      <label>Username</label>
      <input type="text" id="auth-user" placeholder="Enter username">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="auth-pass" placeholder="Enter password">
    </div>
    <div class="error-msg" id="auth-err"></div>
    <button class="btn btn-gold" id="auth-btn" style="width: 100%; margin-top: 1rem;" onclick="doAuth()">Submit</button>
  </div>
</div>

<div class="overlay" id="sell-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeSell()">✕</button>
    <h2>List an Item</h2>
    <div class="form-group" style="margin-top:1rem;">
      <label>Product Photo</label>
      <input type="file" id="sell-img" accept="image/*">
    </div>
    <div class="form-group">
      <label>Title</label>
      <input type="text" id="sell-title" placeholder="Item name">
    </div>
    <div class="form-group">
      <label>Price (Coins)</label>
      <input type="number" id="sell-price" placeholder="50">
    </div>
    <div class="form-group">
      <label>Description</label>
      <textarea id="sell-desc" rows="3"></textarea>
    </div>
    <div class="error-msg" id="sell-err"></div>
    <button class="btn btn-gold" style="width: 100%;" onclick="doSell()">Post Listing</button>
  </div>
</div>

<div class="overlay" id="admin-overlay">
  <div class="modal" style="max-width: 600px;">
    <button class="modal-close" onclick="document.getElementById('admin-overlay').classList.remove('show')">✕</button>
    <h2>Admin Control Panel</h2>
    <div id="admin-user-list" style="margin-top: 1rem; max-height: 300px; overflow-y: auto;"></div>
    <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1rem;">
      <label>Give Coins</label>
      <div style="display: flex; gap: 0.5rem;">
        <input type="text" id="adm-target" placeholder="Username">
        <input type="number" id="adm-amt" placeholder="Amount">
        <button class="btn btn-gold" onclick="giveCoins()">Give</button>
      </div>
    </div>
  </div>
</div>

<script>
let currentUser = null;
let mode = 'login';

// --- API HELPER ---
async function api(method, path, body) {
  const options = {
    method,
    headers: { 'Content-Type': 'application/json' }
  };
  const token = localStorage.getItem('token');
  if (token) options.headers['Authorization'] = `Bearer ${token}`;
  if (body) options.body = JSON.stringify(body);
  
  const res = await fetch(path, options);
  return res.json();
}

// --- AUTH LOGIC ---
function openAuth(m) {
  mode = m;
  document.getElementById('auth-title').textContent = m === 'login' ? 'Login' : 'Register';
  document.getElementById('auth-overlay').classList.add('show');
}
function closeAuth() { document.getElementById('auth-overlay').classList.remove('show'); }

async function doAuth() {
  const username = document.getElementById('auth-user').value;
  const password = document.getElementById('auth-pass').value;
  const endpoint = mode === 'login' ? '/api/login' : '/api/register';
  
  const res = await api('POST', endpoint, { username, password });
  if (res.error) {
    document.getElementById('auth-err').textContent = res.error;
  } else {
    localStorage.setItem('token', res.token);
    localStorage.setItem('username', res.username);
    location.reload();
  }
}

function checkUser() {
  const user = localStorage.getItem('username');
  if (user) {
    currentUser = user;
    let nav = `
      <div class="nav-user">
        <span class="coin-badge">🪙 <span>...</span></span>
        <strong>${user}</strong>
      </div>
      <button class="btn btn-outline" onclick="logout()">Logout</button>
    `;
    if (user === 'admin') {
      nav = `<button class="btn btn-gold" onclick="openAdmin()">👑 Admin</button>` + nav;
    }
    document.getElementById('nav-content').innerHTML = nav;
  }
}

function logout() {
  localStorage.clear();
  location.reload();
}

// --- LISTINGS ---
async function loadListings() {
  const listings = await api('GET', '/api/listings');
  const grid = document.getElementById('grid');
  grid.innerHTML = listings.map(l => `
    <div class="card">
      ${l.image ? `<img src="${l.image}" class="card-img">` : ''}
      <div class="card-title">${l.title}</div>
      <div class="card-desc">${l.desc || 'No description provided.'}</div>
      <div class="card-footer">
        <div class="card-price">🪙 ${l.price}</div>
        <div style="font-size: 0.8rem; color: var(--text-muted)">by ${l.seller}</div>
      </div>
      <div style="margin-top: 1rem;">
        ${(currentUser === 'admin' || currentUser === l.seller) 
          ? `<button class="btn btn-danger" style="width:100%" onclick="deleteItem('${l.id}')">Remove</button>`
          : `<button class="btn btn-green" style="width:100%" onclick="alert('Bought!')">Buy Now</button>`}
      </div>
    </div>
  `).join('');
}

async function deleteItem(id) {
  if (confirm('Delete this listing?')) {
    await api('DELETE', `/api/listings/${id}`);
    loadListings();
  }
}

// --- SELL LOGIC ---
function openSell() {
  if (!currentUser) return alert('Please login first');
  document.getElementById('sell-overlay').classList.add('show');
}
function closeSell() { document.getElementById('sell-overlay').classList.remove('show'); }

async function doSell() {
  const file = document.getElementById('sell-img').files[0];
  let base64 = null;
  
  if (file) {
    base64 = await new Promise(resolve => {
      const reader = new FileReader();
      reader.onloadend = () => resolve(reader.result);
      reader.readAsDataURL(file);
    });
  }

  const data = {
    title: document.getElementById('sell-title').value,
    price: document.getElementById('sell-price').value,
    desc: document.getElementById('sell-desc').value,
    image: base64,
    category: 'Other'
  };

  const res = await api('POST', '/api/listings', data);
  if (res.error) alert(res.error);
  else {
    closeSell();
    loadListings();
  }
}

// --- ADMIN ---
async function openAdmin() {
  document.getElementById('admin-overlay').classList.add('show');
  const users = await api('GET', '/api/admin/users');
  document.getElementById('admin-user-list').innerHTML = users.map(u => `
    <div style="display:flex; justify-content:space-between; padding: 0.5rem; border-bottom: 1px solid var(--border)">
      <span>${u.username}</span>
      <span style="color:var(--gold)">🪙 ${u.coins}</span>
    </div>
  `).join('');
}

async function giveCoins() {
  const target = document.getElementById('adm-target').value;
  const amount = document.getElementById('adm-amt').value;
  await api('POST', '/api/admin/give-coins', { target, amount });
  openAdmin(); // refresh list
}

checkUser();
loadListings();
</script>
</body>
</html>
